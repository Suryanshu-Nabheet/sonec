name: Daily

# Nightly suite integrity + mock harness smoke.
# Uploads DAILY_STATUS.* as workflow artifacts (no commits — keeps Contributors clean).
# Live Cap200 / MLX LoRA eval stays local — see scripts/capabilitybench_e2e.sh.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-status
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check sonec tests scripts

      - name: Daily stats (pytest + Cap200 shape + mock bench)
        run: python scripts/ci_daily_stats.py

      - name: Upload daily status artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-status-${{ github.run_id }}
          path: |
            docs/results/DAILY_STATUS.md
            docs/results/DAILY_STATUS.json
          if-no-files-found: warn
          retention-days: 30
