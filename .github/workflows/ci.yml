name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check sonec tests scripts
      - name: Pytest
        run: pytest -q
      - name: CapabilityBench integrity
        run: |
          sonec capabilitybench
          python -c "import json; from pathlib import Path; d=json.loads(Path('examples/benchmarks/capabilitybench_v1.json').read_text()); assert d['task_count']==200 and d['sealed'] is True"
      - name: Mock benchmark
        run: sonec bench --mock --out artifacts/benchmarks/ci.json
